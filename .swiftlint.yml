# SwiftLint Configuration for Onyx Terminal

# Paths to exclude from linting
excluded:
  - Pods
  - Carthage
  - .build
  - DerivedData
  - fastlane
  - vendor

# Paths to include (default is all .swift files)
included:
  - Sources
  - Tests

# Opt-in rules
opt_in_rules:
  - empty_count
  - empty_string
  - explicit_init
  - first_where
  - sorted_first_last
  - closure_spacing
  - contains_over_first_not_nil
  - fallthrough
  - fatal_error_message
  - file_header
  - force_unwrapping
  - implicitly_unwrapped_optional
  - let_var_whitespace
  - multiline_arguments
  - multiline_parameters
  - operator_usage_whitespace
  - overridden_super_call
  - private_outlet
  - redundant_nil_coalescing
  - single_test_class
  - sorted_imports
  - switch_case_on_newline
  - unneeded_parentheses_in_closure_argument
  - vertical_parameter_alignment_on_call

# Disabled rules
disabled_rules:
  - trailing_whitespace

# Rule configurations
line_length:
  warning: 120
  error: 150
  ignores_comments: true
  ignores_urls: true

file_length:
  warning: 500
  error: 1000

function_body_length:
  warning: 50
  error: 100

type_body_length:
  warning: 300
  error: 500

cyclomatic_complexity:
  warning: 10
  error: 20

nesting:
  type_level:
    warning: 2
  function_level:
    warning: 3

identifier_name:
  min_length:
    warning: 2
  max_length:
    warning: 50
  excluded:
    - id
    - x
    - y
    - z

type_name:
  min_length: 3
  max_length: 50

# Reporter type
reporter: "xcode"
