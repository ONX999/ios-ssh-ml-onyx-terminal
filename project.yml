name: OnyxTerminal
options:
  minimumXcodeGenVersion: 2.38.0
  deploymentTarget:
    iOS: "16.0"
packages:
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm
    branch: main
  Shout:
    url: https://github.com/jakeheis/Shout
    branch: main
  NIOSSH:
    url: https://github.com/apple/swift-nio-ssh
    branch: main
targets:
  OnyxTerminal:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: Sources/App
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.onx999.OnyxTerminal
        INFOPLIST_FILE: Sources/App/Info.plist
        SWIFT_VERSION: 5.9
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        PRODUCT_NAME: Onyx Terminal
    dependencies:
      - package: SwiftTerm
      - package: Shout
      - package: NIOSSH
    scheme:
      testTargets: []
